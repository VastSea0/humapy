<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kütüphane Gönder - Hüma</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --surface: #131313;
            --on-surface: #e5e2e1;
            --primary: #ffb4a2;
            --on-primary: #611200;
            --outline: #5a413a;
            --glass: rgba(42, 42, 42, 0.4);
            --font-body: 'Inter', sans-serif;
        }

        body {
            background-color: var(--surface);
            color: var(--on-surface);
            font-family: var(--font-body);
            margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
        }

        .container {
            max-width: 600px;
            width: 100%;
            padding: 40px;
            background: var(--glass);
            backdrop-filter: blur(24px);
            border: 1px solid var(--outline);
            border-radius: 4px;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; scale: 0.95; }
            to { opacity: 1; scale: 1; }
        }

        h2 { font-size: 2.5rem; margin-bottom: 24px; color: var(--primary); letter-spacing: -1px; }

        .form-group { margin-bottom: 24px; }

        label { display: block; margin-bottom: 8px; font-weight: 600; color: #888; font-size: 0.9rem; }

        input, textarea {
            width: 100%;
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--outline);
            padding: 12px;
            color: var(--on-surface);
            border-radius: 2px;
            outline: none;
            font-family: inherit;
        }

        input:focus, textarea:focus { border-color: var(--primary); }

        .submit-btn {
            background: var(--primary);
            color: var(--on-primary);
            padding: 12px 24px;
            border: none;
            border-radius: 4px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
            transition: all 0.3s;
        }

        .submit-btn:hover { filter: brightness(1.1); transform: translateY(-2px); }

        .back-link { display: block; text-align: center; margin-top: 24px; color: #555; text-decoration: none; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back-link">← Geri Dön</a>
        <h2>Yeni Kütüphane Gönder</h2>
        <div class="form-group">
            <label>Kütüphane Adı</label>
            <input type="text" id="ad" placeholder="Örn: huma_istatistik">
        </div>
        <div class="form-group">
            <label>Sürüm</label>
            <input type="text" id="surum" placeholder="Örn: 0.1.0">
        </div>
        <div class="form-group">
            <label>Açıklama</label>
            <textarea id="aciklama" rows="3" placeholder="Kütüphanenin ne işe yaradığını kısaca açıklayın..."></textarea>
        </div>
        <div class="form-group">
            <label>Yazar</label>
            <input type="text" id="yazar" placeholder="GitHub kullanıcı adınız">
        </div>
        <button class="submit-btn" onclick="submitLib()">GÖNDER</button>
    </div>

    <script>
        async function submitLib() {
            const data = {
                ad: document.getElementById('ad').value,
                surum: document.getElementById('surum').value,
                aciklama: document.getElementById('aciklama').value,
                yazar: document.getElementById('yazar').value
            };

            await fetch('/api/gonder', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            alert('Kütüphane isteği gönderildi! Onaylandıktan sonra listede görünecektir.');
            window.location.href = '/';
        }
    </script>
</body>
</html>
