<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yönetici Paneli - Hüma Kütüphane</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --surface: #131313;
            --on-surface: #e5e2e1;
            --primary: #ffb4a2;
            --on-primary: #611200;
            --outline: #5a413a;
            --glass: rgba(42, 42, 42, 0.4);
        }

        body {
            background-color: var(--surface); color: var(--on-surface);
            font-family: 'Inter', sans-serif;
            margin: 0; padding: 40px;
        }

        .container { max-width: 1000px; margin: 0 auto; }

        h2 { font-size: 2.5rem; margin-bottom: 40px; color: var(--primary); letter-spacing: -1px; }

        .pending-card {
            background: var(--glass);
            border: 1px solid var(--outline);
            padding: 24px;
            border-radius: 4px;
            margin-bottom: 24px;
            display: flex; justify-content: space-between; align-items: center;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .info h3 { font-size: 1.5rem; margin: 0 0 8px; }

        .info p { color: #888; font-size: 0.95rem; margin-bottom: 12px; }

        .meta { font-size: 0.85rem; color: #555; display: flex; gap: 16px; }

        .approve-btn {
            background: #2b98dc; color: #fff;
            padding: 12px 24px; border: none; border-radius: 4px; font-weight: 600;
            cursor: pointer; transition: 0.3s;
        }

        .approve-btn:hover { background: #91cdff; color: #003350; transform: translateY(-2px); }

        .empty-msg { text-align: center; color: #555; padding: 100px; font-style: italic; }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" style="color: #555; text-decoration: none; font-size: 0.9rem; display: block; margin-bottom: 24px;">← Siteye Dön</a>
        <h2>Bekleyen İstekleri Onayla</h2>
        <div id="pending-list">
            <!-- JavaScript ile doldurulacak -->
        </div>
    </div>

    <script>
        async function fetchPending() {
            const res = await fetch('/api/kutuphaneler');
            const libs = await res.json();
            
            const list = document.getElementById('pending-list');
            list.innerHTML = '';
            
            const pending = libs.filter(l => l.durum === 'bekliyor');
            
            if (pending.length === 0) {
                list.innerHTML = '<div class="empty-msg">Onay bekleyen yeni kütüphane isteği bulunmuyor.</div>';
                return;
            }

            pending.forEach(lib => {
                const card = document.createElement('div');
                card.className = 'pending-card';
                card.innerHTML = `
                    <div class="info">
                        <h3>${lib.ad} <span style="font-size: 0.8rem; opacity: 0.5;">v${lib.surum}</span></h3>
                        <p>${lib.aciklama}</p>
                        <div class="meta">
                            <span>Gönderen: @${lib.yazar}</span>
                        </div>
                    </div>
                    <button class="approve-btn" onclick="approve('${lib.ad}')">ONAYLA</button>
                `;
                list.appendChild(card);
            });
        }

        async function approve(name) {
            await fetch('/api/onayla', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ ad: name })
            });
            fetchPending();
        }

        fetchPending();
    </script>
</body>
</html>
