<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hüma Kütüphaneleri - Topluluk Paylaşım Platformu</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --surface: #131313;
            --surface-container: #1c1b1b;
            --on-surface: #e5e2e1;
            --primary: #ffb4a2;
            --on-primary: #611200;
            --accent: #f95c34;
            --tertiary: #91cdff;
            --outline: #5a413a;
            --glass: rgba(42, 42, 42, 0.4);
            --font-body: 'Inter', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--surface);
            color: var(--on-surface);
            font-family: var(--font-body);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* ── Decor ── */
        .glow {
            position: fixed;
            top: -20%;
            left: -10%;
            width: 60%;
            height: 60%;
            background: radial-gradient(circle, rgba(255, 180, 162, 0.05) 0%, transparent 70%);
            z-index: -1;
            pointer-events: none;
        }

        header {
            max-width: 1200px;
            margin: 60px auto 40px;
            padding: 0 24px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            animation: fadeUp 0.8s ease-out;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 700;
            letter-spacing: -2px;
            line-height: 1;
            margin-bottom: 8px;
            background: linear-gradient(to right, var(--on-surface), #888);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        h1 span {
            color: var(--primary);
        }

        .subtitle {
            color: var(--outline);
            font-size: 1.1rem;
            max-width: 600px;
        }

        .cta-btn {
            display: inline-block;
            background-color: var(--primary);
            color: var(--on-primary);
            padding: 12px 32px;
            border-radius: 4px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid transparent;
        }

        .cta-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(255, 180, 162, 0.2);
            filter: brightness(1.1);
        }

        main {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 24px;
        }

        .search-area {
            margin-bottom: 60px;
            border-bottom: 1px solid var(--outline);
            padding-bottom: 24px;
            display: flex;
            gap: 24px;
            align-items: center;
        }

        .search-input {
            background: transparent;
            border: none;
            color: var(--on-surface);
            font-size: 1.2rem;
            width: 100%;
            outline: none;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 32px;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--outline);
            padding: 32px;
            border-radius: 4px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .card:hover {
            border-color: var(--primary);
            background: rgba(42, 42, 42, 0.6);
            transform: translateY(-4px);
        }

        .card::after {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, transparent 50%, var(--primary) 50%);
            opacity: 0.1;
            transition: opacity 0.3s;
        }

        .card:hover::after {
            opacity: 0.4;
        }

        .card-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .version-badge {
            font-family: var(--font-mono);
            font-size: 0.8rem;
            background: rgba(255, 180, 162, 0.1);
            color: var(--primary);
            padding: 4px 10px;
            border-radius: 2px;
            border: 1px solid rgba(255, 180, 162, 0.2);
        }

        .description {
            font-size: 1rem;
            color: #aaa;
            margin-bottom: 24px;
            min-height: 3em;
        }

        .meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 20px;
            font-size: 0.9rem;
        }

        .author {
            color: var(--accent);
            font-weight: 600;
        }

        .downloads {
            color: var(--outline);
        }

        .install-cmd {
            background: rgba(0,0,0,0.3);
            font-family: var(--font-mono);
            padding: 12px;
            border-radius: 4px;
            margin-top: 20px;
            font-size: 0.85rem;
            color: var(--tertiary);
            cursor: pointer;
            position: relative;
            border: 1px solid rgba(145, 205, 255, 0.1);
        }

        .install-cmd:active {
            filter: brightness(1.2);
        }

        .install-cmd::before {
            content: '$ ';
            color: #555;
        }

        footer {
            max-width: 1200px;
            margin: 100px auto 40px;
            padding: 0 24px;
            border-top: 1px solid var(--outline);
            padding-top: 40px;
            text-align: center;
            color: var(--outline);
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            h1 { font-size: 2.5rem; }
            header { flex-direction: column; align-items: flex-start; gap: 20px; }
        }
    </style>
</head>
<body>
    <div class="glow"></div>

    <header>
        <div>
            <h1>Hüma <span>Kütüphaneleri</span></h1>
            <p class="subtitle">Topluluk tarafından geliştirilen Hüma kütüphanelerini keşfedin, paylaşın ve projenize dahil edin.</p>
        </div>
        <a href="/ekle" class="cta-btn">Kütüphane Gönder</a>
    </header>

    <main>
        <div class="search-area">
            <input type="text" class="search-input" placeholder="Paket ismi veya açıklama ile ara...">
        </div>

        <div class="grid" id="lib-grid">
            <!-- Yükleniyor... -->
        </div>
    </main>

    <footer>
        &copy; 2026 Hüma Programlama Dili Topluluğu. <br>
        Backend Altyapısı Tamamen Hüma ile Geliştirilmiştir.
    </footer>

    <script>
        async function fetchLibs() {
            const res = await fetch('/api/kutuphaneler');
            const libs = await res.json();
            
            const grid = document.getElementById('lib-grid');
            grid.innerHTML = '';
            
            libs.filter(l => l.durum === 'onaylandı').forEach((lib, i) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.style.animation = `fadeUp 0.6s ease-out ${i * 0.1}s forwards`;
                card.style.opacity = '0';
                
                card.innerHTML = `
                    <div>
                        <div class="card-title">
                            ${lib.ad}
                            <span class="version-badge">v${lib.surum}</span>
                        </div>
                        <p class="description">${lib.aciklama}</p>
                    </div>
                    <div>
                        <div class="install-cmd" onclick="copy('${lib.ad}')">huma paket kur ${lib.ad}</div>
                        <div class="meta">
                            <span class="author">@${lib.yazar}</span>
                            <span class="downloads">${lib.indirme_sayisi} indirme</span>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function copy(name) {
            const cmd = `huma paket kur ${name}`;
            navigator.clipboard.writeText(cmd);
            alert('Komut panoya kopyalandı!');
        }

        fetchLibs();
    </script>
</body>
</html>
