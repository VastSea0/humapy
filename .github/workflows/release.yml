name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create-release.outputs.id }}
    steps:
      - name: Create Release
        id: create-release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          name: Release ${{ github.ref_name }}
          generate_release_notes: true

  # ── Build the standalone huma CLI binary for self_update ────────────
  build-cli:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'ubuntu-latest'
            target: 'x86_64-unknown-linux-gnu'
            artifact: 'huma-x86_64-unknown-linux-gnu.tar.gz'
          - platform: 'macos-latest'
            target: 'x86_64-apple-darwin'
            artifact: 'huma-x86_64-apple-darwin.tar.gz'
          - platform: 'macos-latest'
            target: 'aarch64-apple-darwin'
            artifact: 'huma-aarch64-apple-darwin.tar.gz'
          - platform: 'windows-latest'
            target: 'x86_64-pc-windows-msvc'
            artifact: 'huma-x86_64-pc-windows-msvc.zip'

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Rust Stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust Cache
        uses: swatinem/rust-cache@v2

      - name: Build CLI Release Binary
        run: cargo build --release --package huma-cli --target ${{ matrix.target }}

      - name: Package CLI Binary (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.artifact }} huma
          cd ../../..

      - name: Package CLI Binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "target/${{ matrix.target }}/release/huma.exe" -DestinationPath "${{ matrix.artifact }}"

      - name: Upload CLI Binary to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Build the Tauri IDE application ────────────────────────────────
  build-ide:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            os: 'macos'
            args: '--target universal-apple-darwin'
          - platform: 'ubuntu-latest'
            os: 'linux'
            args: ''
          - platform: 'windows-latest'
            os: 'windows'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust Stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            src-tauri

      - name: Install Dependencies (Linux)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Frontend Dependencies
        working-directory: ide
        run: npm install

      - name: Build and Release Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          projectPath: "src-tauri"
          args: ${{ matrix.args }}
