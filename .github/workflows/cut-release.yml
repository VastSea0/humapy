name: Cut New Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'New version (e.g., 0.3.0)'
        required: true
        type: string

jobs:
  bump-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          
      - name: Update Versions
        run: |
          # Update root Cargo.toml
          sed -i -E "s/^version = \".*\"/version = \"${{ inputs.version }}\"/" Cargo.toml
          
          # Update src-tauri/Cargo.toml
          if [ -f "src-tauri/Cargo.toml" ]; then
            sed -i -E "s/^version = \".*\"/version = \"${{ inputs.version }}\"/" src-tauri/Cargo.toml
          fi
          
          # Update src-tauri/tauri.conf.json
          if [ -f "src-tauri/tauri.conf.json" ]; then
            sed -i -E "s/\"version\": \".*\"/\"version\": \"${{ inputs.version }}\"/" src-tauri/tauri.conf.json
          fi
          
          # Update ide/package.json
          if [ -f "ide/package.json" ]; then
            sed -i -E "s/\"version\": \".*\"/\"version\": \"${{ inputs.version }}\"/" ide/package.json
          fi

      - name: Commit and Tag
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add Cargo.toml src-tauri/Cargo.toml src-tauri/tauri.conf.json ide/package.json
          git commit -m "chore: bump version to v${{ inputs.version }}" || echo "No changes to commit"
          
          # Create and push tag
          git tag "v${{ inputs.version }}"
          
          # Push changes and tags
          git push origin HEAD
          git push origin "v${{ inputs.version }}"
